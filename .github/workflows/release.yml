name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            targets: dmg
          - os: windows-latest
            targets: nsis
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Run JS tests
        run: node tests/math-regex.test.mjs

      - name: Run Rust tests
        run: cd src-tauri && cargo test

      - name: Build
        run: npx tauri build

      - name: Create tag
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git tag -f "v${VERSION}"
          git push -f origin "v${VERSION}"

      - name: Upload to Release (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          draft: false
          generate_release_notes: true

      - name: Update Homebrew tap
        if: matrix.os == 'macos-latest'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DMG_PATH=$(ls src-tauri/target/release/bundle/dmg/*.dmg)
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')

          cat > /tmp/covalent.rb <<'RUBY'
          cask "covalent" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://github.com/yoaquim/covalent/releases/download/v#{version}/Covalent_#{version}_aarch64.dmg"
            name "Covalent"
            desc "Native Markdown viewer with math, diagrams, and syntax highlighting"
            homepage "https://github.com/yoaquim/covalent"

            app "Covalent.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/Covalent.app"]
            end
          end
          RUBY

          sed -i '' 's/^          //' /tmp/covalent.rb
          sed -i '' "s/VERSION_PLACEHOLDER/$VERSION/" /tmp/covalent.rb
          sed -i '' "s/SHA256_PLACEHOLDER/$SHA256/" /tmp/covalent.rb

          CONTENT=$(base64 -i /tmp/covalent.rb)
          FILE_SHA=$(curl -s -H "Authorization: Bearer $TAP_TOKEN" \
            https://api.github.com/repos/yoaquim/homebrew-tap/contents/Casks/covalent.rb \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

          curl -s -X PUT \
            -H "Authorization: Bearer $TAP_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/yoaquim/homebrew-tap/contents/Casks/covalent.rb \
            -d "{\"message\":\"Update Covalent to ${VERSION}\",\"content\":\"${CONTENT}\",\"sha\":\"${FILE_SHA}\"}"

      - name: Upload to Release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          generate_release_notes: true
